# 由 builder-loop init 向导生成；可手动编辑

pass_cmd:
  - { stage: "e2e", cmd: "bash skills/builder-loop/fixtures/e2e/test-new-repo-loop.sh", timeout: 120 }
  - { stage: "parallel", cmd: "bash skills/builder-loop/fixtures/e2e/test-parallel-loop.sh", timeout: 120 }
  - { stage: "zombie_selfheal", cmd: "bash skills/builder-loop/fixtures/e2e/test-zombie-selfheal.sh", timeout: 30 }
  - { stage: "stop_hook_cursor", cmd: "bash skills/builder-loop/fixtures/e2e/test-stop-hook-cursor.sh", timeout: 60 }
  - { stage: "race_and_msg", cmd: "bash skills/builder-loop/fixtures/e2e/test-stop-hook-race-and-commit-msg.sh", timeout: 60 }
  - { stage: "judge_agent", cmd: "bash skills/builder-loop/fixtures/e2e/test-judge-agent.sh", timeout: 120 }
  - { stage: "judge_integration", cmd: "bash skills/builder-loop/fixtures/e2e/test-judge-integration.sh", timeout: 120 }
  - { stage: "v2_pass_cmd_in_worktree", cmd: "bash skills/builder-loop/fixtures/e2e/test-pass-cmd-runs-worktree.sh", timeout: 60 }
  - { stage: "v2_bare_loop_merge", cmd: "bash skills/builder-loop/fixtures/e2e/test-bare-loop-merge.sh", timeout: 60 }
  - { stage: "v2_run_pass_cmd_args", cmd: "bash skills/builder-loop/fixtures/e2e/test-run-pass-cmd-args.sh", timeout: 60 }
  - { stage: "v2_nudge_max_reads_worktree", cmd: "bash skills/builder-loop/fixtures/e2e/test-nudge-max-reads-worktree.sh", timeout: 60 }

max_iterations: 5

layout:
  source_dirs: ["scripts", "skills/builder-loop/scripts"]
  test_dirs: ["skills/builder-loop/fixtures/e2e"]

worktree:
  enabled: true
